name = "jolt-host"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".output"

# ── D1 database ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "jolt-host-db"
database_id = "c2e689e0-d2cb-4187-84dc-1b6223ae1ee3"

# ── R2 object storage ───────────────────────────────────────
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "jolt-host-storage"
