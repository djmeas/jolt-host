name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Use pull_request (NOT pull_request_target) so fork PRs cannot access secrets
    branches: [main]

# Drop all permissions by default; grant only what's needed
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Pin actions to full SHA for supply-chain safety
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm nuxt typecheck || true  # non-blocking until types are clean

      - name: Run tests
        run: pnpm test
